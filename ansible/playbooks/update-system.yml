---
- name: System security updates
  hosts: all
  become: true
  vars_files:
  - ../group_vars/all.yml
  - ../group_vars/{{ __environment }}.yml

  tasks:
  - name: Update apt cache
    apt:
      update_cache: yes

  - name: Upgrade security packages only
    apt:
      upgrade: security
      update_cache: yes

  - name: Check if reboot is required
    stat:
      path: /var/run/reboot-required
    register: reboot_required

  - name: Reboot if required
    reboot:
      msg: "Reboot initiated by Ansible for security updates"
      connect_timeout: 5
      reboot_timeout: 300
      pre_reboot_delay: 0
      post_reboot_delay: 30
      test_command: whoami
    when: reboot_required.stat.exists